<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color: #212121; color: white;">
    <div class="parent">
        <div id="child">monday</div>
        <div id="child">thusday</div>
        <div id="child">wednesday</div>
        <div id="child">thursday</div>
    </div>

</body>
<script>
    const pele = document.querySelector('.parent');
    console.log(pele);
    console.log(pele.children[0].innerHTML);

    for(let i = 0; i < pele.children.length; i++){
        console.log(pele.children[i].innerHTML);
    }

    console.log(pele.firstChild); // it will give us the text node which is a line break in this case
    console.log(pele.firstElementChild); 
    console.log(pele.lastElementChild);

    const newele = document.querySelector('#child');
    console.log(newele.parentElement);


    console.log(pele.childNodes);

    // to create new element
    const div = document.createElement('div')
    console.log(div);
    document.body.appendChild(div)
    div.innerHTML = 'friday';
    div.className = 'jschild';
    div.setAttribute('title', 'friday');

    // create element in optamized way
    const div2 = document.createElement('div')
    div2.appendChild(document.createTextNode('saturday'))
    document.querySelector('.parent').appendChild(div2)

    // edit element    
    const context = document.querySelector('.parent').children[4];
   // document.write(context.innerHTML);
    const newele2 = document.createElement('div');
    newele2.appendChild(document.createTextNode('weekend'))
    context.replaceWith(newele2)
</script>
</html>
