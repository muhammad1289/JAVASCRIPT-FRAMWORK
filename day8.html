<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<body style="background-color: #212121; color: white;">
   <div class="container">
   <h1>BMI Calculator</h1>
   <form>
    <label for="height">Height (cm):</label>
    <input type="number" id="height" name="height"><br><br>
    <label for="weight">Weight (kg):</label>
    <input type="number" id="weight" name="weight"><br><br>
    <button type="submit" id="btn">Calculate BMI</button>
    <div class="result"></div>
   </form>
   </div>
</body>
<script>

    // const btn = document.getElementById('btn');
    // btn.addEventListener('click', () =>{
    //      const height = document.getElementById('height')
    //      const weight = document.getElementById("weight")
    //      const bmi = weight.value / ((height.value/100) **2 );
    //      const div = document.createElement('div');
    //      const result = document.createTextNode('your bmi is '+ bmi);
    //      div.appendChild(result)
    //      document.body.appendChild(div);
    // })
    // another verion 
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
        e.preventDefault();      // prevent the default form submission behavior
                                 //becouse page will auto send data to server and refresh the page
          const height = parseInt(document.getElementById('height').value);
          const weight = parseInt(document.getElementById("weight").value);
          const result = document.querySelector('.result');

          if (height === '' || height < 0 || isNaN(height)){
            result.textContent = 'Please enter a valid height';
          } else if (weight === '' || weight < 0 || isNaN(weight)){
            result.textContent = 'Please enter a valid weight';
          } else {
            const bmi = weight / ((height / 100) ** 2);
            result.textContent = `Your BMI is ${bmi.toFixed(2)}`;
          }
          }
    );
   
    
</script>
</html>
